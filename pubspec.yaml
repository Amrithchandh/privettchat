name: private_chat_app
description: A private 1:1 messaging application with offline capabilities.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core & Setup
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # Asset & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  emoji_picker_flutter: ^2.1.0
  record: ^5.0.5
  audioplayers: ^5.2.1
  video_player: ^2.8.2
  swipe_to: ^1.0.2
  provider: ^6.1.1
  file_picker: ^8.0.0
  open_filex: ^4.4.0
  # Optional: zego_uikit_prebuilt_call: ^5.0.0 (Excluded for brevity unless user registers)

  # Offline & Utils
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  local_auth: ^2.1.8
  intl: ^0.19.0
  uuid: ^4.3.3
  path: ^1.9.0

  # Export Feature
  path_provider: ^2.1.2
  pdf: ^3.10.7
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
